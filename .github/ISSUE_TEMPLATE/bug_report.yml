name: Bug Report
description: File a bug report for AutoSLP
title: "[BUG] "
labels: ["bug:medium"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Provide a clear and concise description of the bug.
      placeholder: Describe what happens...
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Provide a numbered list of steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected_behaviour
    attributes:
      label: Expected behaviour
      description: Tell us what you expected to happen.
  - type: textarea
    id: actual_behaviour
    attributes:
      label: Actual behaviour
      description: Tell us what actually happened.
  - type: input
    id: browser_os_version
    attributes:
      label: Browser + OS + Version
      placeholder: e.g. Chrome 125, macOS Sonoma
  - type: textarea
    id: console_errors
    attributes:
      label: Console errors
      description: Share any relevant console log outputs or error traces.
      render: bash
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Insert links or drag/drop images demonstrating the bug.
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this bug occur?
      options:
        - Always
        - Sometimes
        - Rarely
    validations:
      required: true
