name: Production Orchestrated Deployment (Manual Control Gates)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version identifier tag (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'

jobs:
  gate-approval:
    id: approval_gate
    name: Verify Multi-Signature Approval Gates
    runs-on: ubuntu-latest
    # Target protected production workspace environment which enforces approval rules
    environment:
      name: production
    steps:
      - name: Acknowledge execution auth matches dual security parameters
        run: echo "Dual-peer authentication checkpoint satisfied. Starting production release chain."

  build-and-push:
    id: prod_image_build
    name: Build & Push Release containers to GHCR
    runs-on: ubuntu-latest
    needs: gate-approval
    steps:
      - name: Checkout Source VCS Codebase
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker-Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag and Compile Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.event.inputs.release_version }}

      - name: Tag and Compile Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./autoSLP-server
          file: ./autoSLP-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.event.inputs.release_version }}

  deploy-prod-cluster:
    id: prod_deployment_execute
    name: Execute Production Cluster Rollout
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
    steps:
      - name: Checkout Source Codebase
        uses: actions/checkout@v4

      - name: Bind Cloud Production kubectl parameters
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Execute secure apply sequence against manifest definitions
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployments/
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Ensure rolling upgrades deploy successfully before closing run
        run: |
          kubectl rollout status deployment/autoslp-frontend-deployment -n autoslp --timeout=240s
          kubectl rollout status deployment/autoslp-backend-deployment -n autoslp --timeout=240s

  verify-release:
    id: production_active_verify
    name: Verification Checks
    runs-on: ubuntu-latest
    needs: deploy-prod-cluster
    steps:
      - name: Run post deployment verify check on cluster ports
        run: |
          curl -f -s https://autoslp.com/api/health || exit 1
          curl -f -s https://api.autoslp.com/metrics || exit 1

  vcs-tagger:
    id: production_release_tagger
    name: Register secure git release Version Tag labels
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Bot Attributes
        run: |
          git config --global user.name "AutoSLP Release Automation"
          git config --global user.email "okepreciousab@gmail.com"

      - name: Mint and Register release tag labels
        run: |
          git tag -a ${{ github.event.inputs.release_version }} -m "Official Production Release version ${{ github.event.inputs.release_version }} minted automatically by automated triggers"
          git push origin ${{ github.event.inputs.release_version }}
