apiVersion: v1
kind: Secret
metadata:
  id: autoslp-secret
  name: autoslp-secret
  namespace: autoslp
  annotations:
    # Integrates with Kubernetes Secrets Store CSI driver or Hashicorp Vault injector
    secrets-store.csi.k8s.io/managed: "true"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "autoslp-app-service"
type: Opaque
stringData:
  # Empty placeholders referencing secure Vault paths (Injectors pull database secrets dynamically)
  DATABASE_URL: "vault:secret/data/production/database#CONNECTION_STRING"
  JWT_SECRET: "vault:secret/data/production/tokens#JWT_SECRET_KEY"
  BINANCE_API_KEY: "vault:secret/data/production/binance#API_KEY"
  BINANCE_API_SECRET: "vault:secret/data/production/binance#API_SECRET"
