apiVersion: apps/v1
kind: Deployment
metadata:
  id: autoslp-frontend-dep
  name: autoslp-frontend-deployment
  namespace: autoslp
  labels:
    app: autoslp-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: autoslp-frontend
  template:
    metadata:
      labels:
        app: autoslp-frontend
    spec:
      containers:
        - name: frontend-container
          image: ghcr.io/autoslp/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http-frontend
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 2
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: autoslp-config
                  key: NODE_ENV
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.autoslp.com"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
