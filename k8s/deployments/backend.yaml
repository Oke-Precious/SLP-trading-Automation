apiVersion: apps/v1
kind: Deployment
metadata:
  id: autoslp-backend-dep
  name: autoslp-backend-deployment
  namespace: autoslp
  labels:
    app: autoslp-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: autoslp-backend
  template:
    metadata:
      labels:
        app: autoslp-backend
    spec:
      containers:
        - name: backend-container
          image: ghcr.io/autoslp/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http-backend
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 2
          envFrom:
            - configMapRef:
                name: autoslp-config
            - secretRef:
                name: autoslp-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
