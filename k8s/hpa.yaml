apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  id: autoslp-frontend-hpa
  name: autoslp-frontend-hpa
  namespace: autoslp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoslp-frontend-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  id: autoslp-backend-hpa
  name: autoslp-backend-hpa
  namespace: autoslp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoslp-backend-deployment
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # 1. Scale based on CPU Load levels (Target: 60%)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # 2. Scale based on Custom Prometheus metric for active WS connections
    - type: Pods
      pods:
        metric:
          name: autoSLP_ws_connections_active
        target:
          type: AverageValue
          averageValue: "500"
