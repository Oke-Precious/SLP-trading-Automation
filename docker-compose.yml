version: '3.8'

services:
  postgres:
    id: postgres_container
    image: timescale/timescaledb:latest-pg16
    container_name: autoslp-postgres-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoslp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_dev}
    restart: unless-stopped

  redis:
    id: redis_container
    image: redis:7-alpine
    container_name: autoslp-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  server:
    id: server_container
    build:
      context: ./autoSLP-server
      dockerfile: Dockerfile
    container_name: autoslp-backend-dev
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres_secure_dev@postgres:5432/autoslp?schema=public
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./autoSLP-server:/app
      - /app/node_modules
    restart: always

  client:
    id: client_container
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: autoslp-frontend-dev
    ports:
      - "3000:3000"
    depends_on:
      - server
    env_file:
      - .env.example
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    volumes:
      - .:/app
      - /app/node_modules
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
